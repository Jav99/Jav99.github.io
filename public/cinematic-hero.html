<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Hero — Scroll Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ─────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: auto; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #0a0a0a;
  color: #fff;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── Scroll spacer ────────────────────────────────────── */
.scroll-spacer { height: 500vh; position: relative; }

/* ─── Sticky viewport ──────────────────────────────────── */
.sticky-viewport {
  position: sticky;
  top: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: #0a0a0a;
  z-index: 1;
}

/* ─── Dark overlay ─────────────────────────────────────── */
.dark-overlay {
  position: absolute;
  inset: 0;
  background: #0a0a0a;
  z-index: 15;
  pointer-events: none;
}

/* ─── Phone ────────────────────────────────────────────── */
.phone-container {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.85);
  z-index: 10;
  opacity: 0;
  will-change: transform, opacity;
}

.phone-frame {
  background: #e8e8ed;
  border-radius: 40px;
  padding: 12px;
  box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
  transition: box-shadow 0.3s ease;
}

.phone-screen {
  background: #fff;
  border-radius: 30px;
  width: 260px;
  padding: 0 0 20px 0;
  overflow: hidden;
  position: relative;
}

@media (min-width: 768px) {
  .phone-screen { width: 300px; }
}

/* ─── Notch ────────────────────────────────────────────── */
.notch-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 0 8px;
  position: relative;
}
.notch {
  width: 90px;
  height: 24px;
  background: #1a1a1a;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
}
.camera-dot {
  width: 10px;
  height: 10px;
  background: #2a2a3a;
  border-radius: 50%;
}

/* ─── Phone content ────────────────────────────────────── */
.phone-content {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #3B8BD4, #1D9E75);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
}

.score-heading {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #94a3b8;
  text-align: center;
}

/* ─── Score gauge ──────────────────────────────────────── */
.gauge-container {
  position: relative;
  width: 130px;
  height: 80px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.gauge-svg {
  width: 130px;
  height: 80px;
  overflow: visible;
}
.gauge-score {
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.gauge-score .big {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: #0f172a;
  display: block;
  line-height: 1;
}
.gauge-score .small {
  font-size: 11px;
  color: #94a3b8;
  font-weight: 500;
}

/* ─── Stars ────────────────────────────────────────────── */
.stars {
  display: flex;
  gap: 3px;
  justify-content: center;
}
.star {
  font-size: 16px;
  color: #EF9F27;
  line-height: 1;
}
.star.dim { opacity: 0.3; }

/* ─── Progress bar ─────────────────────────────────────── */
.progress-section {
  width: 100%;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  font-weight: 600;
  color: #64748b;
  margin-bottom: 6px;
}
.progress-track {
  width: 100%;
  height: 8px;
  background: #f1f5f9;
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  width: 85%;
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, #1D9E75, #3B8BD4);
}

/* ─── Improvement tags ─────────────────────────────────── */
.improve-section {
  width: 100%;
}
.improve-heading {
  font-size: 10px;
  font-weight: 700;
  color: #64748b;
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}
.tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 6px;
  color: #fff;
}
.tag-ats { background: #E24B4A; }
.tag-exp { background: #3B8BD4; }
.tag-skills { background: #1D9E75; }

/* ─── CTA button ───────────────────────────────────────── */
.cta-btn {
  width: 100%;
  padding: 12px;
  background: #1D9E75;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.02em;
  margin-top: 4px;
}

/* ─── Floating elements ────────────────────────────────── */
.floating-el {
  position: absolute;
  left: 50%;
  top: 50%;
  z-index: 8;
  opacity: 0;
  will-change: transform, opacity;
  pointer-events: none;
}

/* ─── Scroll indicator ─────────────────────────────────── */
.scroll-indicator {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  transition: opacity 0.4s ease;
}
.scroll-indicator span {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
.scroll-arrow {
  width: 20px;
  height: 20px;
  border-right: 2px solid rgba(255,255,255,0.35);
  border-bottom: 2px solid rgba(255,255,255,0.35);
  transform: rotate(45deg);
  animation: scrollBounce 2s ease-in-out infinite;
}
@keyframes scrollBounce {
  0%, 100% { transform: rotate(45deg) translateY(0); }
  50% { transform: rotate(45deg) translateY(6px); }
}
</style>
</head>
<body>

<div class="scroll-spacer">

    <div class="dark-overlay" id="darkOverlay"></div>

    <!-- Scroll indicator -->
    <div class="scroll-indicator" id="scrollIndicator">
      <span>Scroll</span>

    <!-- ═══ 12 Floating elements ═══ -->

        <path d="M5 10c0-5.5 4.5-10 10-10h50c5.5 0 10 4.5 10 10v30c0 5.5-4.5 10-10 10H30l-15 15V50H15c-5.5 0-10-4.5-10-10V10z" fill="#E24B4A"/>
        <circle cx="28" cy="25" r="4" fill="#fff"/>

        <rect x="16" y="14" width="30" height="3" rx="1.5" fill="#fff" opacity="0.8"/>

        <circle cx="60" cy="60" r="48" stroke="#3B8BD4" stroke-width="22" stroke-dasharray="75.4 301.59" stroke-dashoffset="-100.53" transform="rotate(-90 60 60)"/>
        <circle cx="60" cy="60" r="48" stroke="#EF9F27" stroke-width="22" stroke-dasharray="60.32 301.59" stroke-dashoffset="-175.93" transform="rotate(-90 60 60)"/>
        <circle cx="60" cy="60" r="48" stroke="#E24B4A" stroke-width="22" stroke-dasharray="65.34 301.59" stroke-dashoffset="-236.25" transform="rotate(-90 60 60)"/>
        <circle id="donutCenter" cx="60" cy="60" r="37" fill="#0a0a0a"/>

    <!-- 5. Large triangle (amber) -->

      <svg width="100" height="90" viewBox="0 0 100 90" fill="none">

    <div class="floating-el" id="el9">

    <!-- ═══ iPhone ═══ -->
    <div class="phone-container" id="phone">

                  stroke-dasharray="157" stroke-dashoffset="23.5"/>

            <!-- Progress -->
            <div class="progress-section">

            <!-- Improvement -->
            <div class="improve-section">
              <div class="improve-heading">Areas for Improvement</div>
              <div class="tags">

            <!-- CTA -->
            <button class="cta-btn">Learn More</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  /* ─── Easing functions ───────────────────────────────── */
  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }
  function easeOutBack(t) {
    var c1 = 1.70158;
    var c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  /* ─── Clamp & lerp helpers ───────────────────────────── */
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function remap(v, inLo, inHi, outLo, outHi) {
    var t = clamp((v - inLo) / (inHi - inLo), 0, 1);
    return outLo + (outHi - outLo) * t;
  }
  function remapEased(v, inLo, inHi, outLo, outHi, easeFn) {
    var t = clamp((v - inLo) / (inHi - inLo), 0, 1);
    return outLo + (outHi - outLo) * easeFn(t);
  }
  function lerp(a, b, t) { return a + (b - a) * t; }

  /* ─── Element refs ───────────────────────────────────── */
  var overlay   = document.getElementById('darkOverlay');
  var phone     = document.getElementById('phone');
  var viewport  = document.getElementById('viewport');
  var scrollInd = document.getElementById('scrollIndicator');
  var donutCenter = document.getElementById('donutCenter');
  var phoneFrame = phone.querySelector('.phone-frame');

  /* ─── Squiggle dash setup ────────────────────────────── */
  var sq1 = document.getElementById('squiggle1');
  var sq2 = document.getElementById('squiggle2');
  var sq1Len = sq1.getTotalLength();
  var sq2Len = sq2.getTotalLength();
  sq1.style.strokeDasharray = sq1Len;
  sq1.style.strokeDashoffset = sq1Len;
  sq2.style.strokeDasharray = sq2Len;
  sq2.style.strokeDashoffset = sq2Len;

  /* ─── Floating element configs ───────────────────────── */
  /*
   * Each element has:
   *   startX/Y: off-screen offset in vw/vh from center
   *   finalX/Y: resting position offset in vw/vh from center
   *   startRot: initial rotation
   *   finalRot: resting rotation
   *   enter: scroll % where it starts appearing (0-1)
   *   wobbleAmp: amplitude of mid-flight sin/cos wobble
   *   wobbleFreq: frequency multiplier
   */
  var configs = [
    /* 0: Resume icon — top-left */
    { startX: -55, startY: -50, finalX: -30, finalY: -22, startRot: -25, finalRot: -2, enter: 0.20, wobbleAmp: 3, wobbleFreq: 2.5 },
    /* 1: Chat bubble coral — bottom-left */
    { startX: -50, startY: 55, finalX: -12, finalY: 24, startRot: 20, finalRot: 0, enter: 0.24, wobbleAmp: 4, wobbleFreq: 2.0 },
    /* 2: Chat bubble orange — bottom-left offset */
    { startX: -55, startY: 50, finalX: -20, finalY: 18, startRot: -15, finalRot: 3, enter: 0.27, wobbleAmp: 3, wobbleFreq: 3.0 },
    /* 3: Donut chart — top-right */
    { startX: 55, startY: -50, finalX: 22, finalY: -16, startRot: 30, finalRot: 0, enter: 0.22, wobbleAmp: 4, wobbleFreq: 1.8 },
    /* 4: Large triangle amber — bottom-right */
    { startX: 55, startY: 55, finalX: 22, finalY: 20, startRot: 45, finalRot: 0, enter: 0.25, wobbleAmp: 3, wobbleFreq: 2.2 },
    /* 5: Med triangle teal — bottom-right offset */
    { startX: 50, startY: 55, finalX: 30, finalY: 15, startRot: -30, finalRot: 5, enter: 0.28, wobbleAmp: 2.5, wobbleFreq: 2.8 },
    /* 6: Small triangle blue — bottom-right far */
    { startX: 60, startY: 50, finalX: 35, finalY: 25, startRot: -50, finalRot: -10, enter: 0.30, wobbleAmp: 2, wobbleFreq: 3.2 },
    /* 7: Squiggle purple — top-right area */
    { startX: 55, startY: -55, finalX: 14, finalY: -6, startRot: 15, finalRot: 0, enter: 0.23, wobbleAmp: 3.5, wobbleFreq: 1.5 },
    /* 8: Squiggle teal — bottom-left area */
    { startX: -60, startY: 55, finalX: -24, finalY: 6, startRot: -20, finalRot: 0, enter: 0.26, wobbleAmp: 3, wobbleFreq: 2.0 },
    /* 9: Dot purple */
    { startX: -50, startY: -55, finalX: -18, finalY: -32, startRot: 0, finalRot: 0, enter: 0.30, wobbleAmp: 2, wobbleFreq: 4.0 },
    /* 10: Dot amber */
    { startX: 50, startY: 50, finalX: 16, finalY: 30, startRot: 0, finalRot: 0, enter: 0.32, wobbleAmp: 2, wobbleFreq: 3.5 },
    /* 11: Dot coral */
    { startX: -55, startY: 50, finalX: -32, finalY: 10, startRot: 0, finalRot: 0, enter: 0.35, wobbleAmp: 1.5, wobbleFreq: 3.0 }
  ];

  var els = [];
  for (var i = 0; i < 12; i++) {
    els.push(document.getElementById('el' + i));
  }

  /* ─── Hex to RGB for color interpolation ─────────────── */
  function hexToRgb(hex) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return [r, g, b];
  }
  var darkBg  = hexToRgb('#0a0a0a');
  var lightBg = hexToRgb('#ffffff');

  /* ─── Scroll handler ─────────────────────────────────── */
  var ticking = false;

  window.addEventListener('scroll', function() {
    if (!ticking) {
      ticking = true;
      requestAnimationFrame(onScroll);
    }
  }, { passive: true });

  function onScroll() {
    ticking = false;

    var scrollY = window.scrollY || window.pageYOffset;
    var maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    var p = clamp(scrollY / maxScroll, 0, 1); // 0→1 progress

    /* ── Scroll indicator: hide after 5% ── */
    scrollInd.style.opacity = p < 0.05 ? String(1 - p / 0.05) : '0';

    /* ═══ Phase 1 — Cinematic Reveal (0–30%) ═══ */

    /* Dark overlay: 1→0 from 0%→30% */
    var overlayOpacity = remapEased(p, 0, 0.30, 1, 0, easeOutCubic);
    overlay.style.opacity = String(overlayOpacity);

    /* Phone: opacity 0→1 and scale 0.85→1.0 from 0%→30% */
    var phoneOpacity = remapEased(p, 0, 0.30, 0, 1, easeOutCubic);
    var phoneScale   = remapEased(p, 0, 0.30, 0.85, 1.0, easeOutCubic);
    phone.style.opacity = String(phoneOpacity);
    phone.style.transform = 'translate(-50%, -50%) scale(' + phoneScale + ')';

    /* ═══ Phase 2 — Floating Elements Enter (20–70%) ═══ */

    for (var i = 0; i < 12; i++) {
      var c = configs[i];
      var elEnter = c.enter;
      var elSettle = Math.min(elEnter + 0.35, 0.70); // each element takes 35% of scroll to arrive

      if (p < elEnter) {
        /* Not yet visible */
        els[i].style.opacity = '0';
        els[i].style.transform = 'translate(calc(-50% + ' + c.startX + 'vw), calc(-50% + ' + c.startY + 'vh)) rotate(' + c.startRot + 'deg)';
      } else {
        var elP = clamp((p - elEnter) / (elSettle - elEnter), 0, 1);
        var easedP = easeOutBack(elP);

        /* Position interpolation */
        var x = lerp(c.startX, c.finalX, easedP);
        var y = lerp(c.startY, c.finalY, easedP);
        var rot = lerp(c.startRot, c.finalRot, easedP);

        /* Mid-flight wobble — diminishes as element approaches final position */
        var wobbleFade = 1 - elP;
        var wobbleX = Math.sin(elP * Math.PI * c.wobbleFreq) * c.wobbleAmp * wobbleFade;
        var wobbleY = Math.cos(elP * Math.PI * c.wobbleFreq * 0.7) * c.wobbleAmp * 0.6 * wobbleFade;

        x += wobbleX;
        y += wobbleY;

        /* Opacity */
        var elOpacity = clamp(elP * 4, 0, 1); // fade in during first 25% of element animation

        els[i].style.opacity = String(elOpacity);
        els[i].style.transform = 'translate(calc(-50% + ' + x.toFixed(2) + 'vw), calc(-50% + ' + y.toFixed(2) + 'vh)) rotate(' + rot.toFixed(2) + 'deg)';
      }
    }

    /* ── Squiggle stroke-dash animation ── */
    var sq1P = clamp((p - configs[7].enter) / 0.30, 0, 1);
    sq1.style.strokeDashoffset = String(sq1Len * (1 - easeOutCubic(sq1P)));

    var sq2P = clamp((p - configs[8].enter) / 0.30, 0, 1);
    sq2.style.strokeDashoffset = String(sq2Len * (1 - easeOutCubic(sq2P)));

    /* ═══ Phase 3 — Cohesive End Frame (70–100%) ═══ */

    /* Background dark → white (70%→100%) */
    var bgP = remapEased(p, 0.70, 1.0, 0, 1, easeOutCubic);
    var r = Math.round(lerp(darkBg[0], lightBg[0], bgP));
    var g = Math.round(lerp(darkBg[1], lightBg[1], bgP));
    var b = Math.round(lerp(darkBg[2], lightBg[2], bgP));
    viewport.style.background = 'rgb(' + r + ',' + g + ',' + b + ')';

    /* Donut center fill matches background */
    donutCenter.setAttribute('fill', 'rgb(' + r + ',' + g + ',' + b + ')');

    /* Phone shadow lightens as background goes white */
    var shadowAlpha = lerp(0.6, 0.12, bgP);
    phoneFrame.style.boxShadow = '0 40px 100px rgba(0,0,0,' + shadowAlpha.toFixed(3) + ')';
  }

  /* Initial call to set state */
  onScroll();

})();
</script>
</body>
</html>
